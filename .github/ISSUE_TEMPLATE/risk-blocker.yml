name: Risk / Blocker
description: Track risks early and unblock fast.
title: "Risk/Blocker: "
labels: ["risk", "blocker"]
body:
  - type: markdown
    attributes:
      value: |
        ## How to use this form
        - Use this when the demo is at risk, you are stuck, or you see a future problem coming.
        - The goal is fast visibility + fast action, not blame.
        - Always assign an owner and next actions.

  - type: textarea
    id: description
    attributes:
      label: What is the risk/blocker?
      placeholder: "Describe it clearly."
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      placeholder: |
        - What could go wrong?
        - What does it delay/break?
        - Demo impact?
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      options:
        - High (this week's demo at risk)
        - Medium (likely pain soon)
        - Low (watchlist)
    validations:
      required: true

  - type: input
    id: owner
    attributes:
      label: Owner
      description: Who is responsible for first action today?
      placeholder: "@github-handle"
    validations:
      required: true

  - type: textarea
    id: next_actions
    attributes:
      label: Next actions (small, concrete)
      description: Write the next 1–3 steps. Small steps beat heroic speeches.
      placeholder: |
        1)
        2)
        3)
    validations:
      required: true

  - type: textarea
    id: help_needed
    attributes:
      label: Help needed (if any)
      placeholder: "What do you need from instructor/TA/another team? Be specific."
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: Evidence / context links
      placeholder: |
        - Related Issue/PR:
        - Error logs / screenshots:
        - Docs link:
    validations:
      required: false