name: Bug Report (Personal-Finance-Intelligence-System)
description: File a bug report to help us improve the Personal-Finance-Intelligence-System
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report for Personal-Finance-Intelligence-System
        Please fill out the following information to help us fix issues.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: A short summary of the bug
      placeholder: App crashes on login
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the bug?
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: The app should log in successfully
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: The app crashes with an error message
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, version, etc.
      placeholder: Windows 11, Chrome 120, App v1.0

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information