<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BudgetBrain Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1117;
    color: #fff;
    display: flex;
  }

  .sidebar {
    width: 220px;
    background: #151a23;
    height: 100vh;
    padding: 20px;
  }

  .logo {
    color: #7c5cff;
    font-size: 20px;
    margin-bottom: 20px;
  }

  .sidebar a {
    display: block;
    padding: 12px;
    margin: 6px 0;
    color: #aaa;
    text-decoration: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .sidebar a.active,
  .sidebar a:hover {
    background: #7c5cff;
    color: white;
  }

  .main {
    flex: 1;
    padding: 20px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .topbar input {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #1c2230;
    color: white;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-top: 20px;
  }

  .card {
    background: #1a2030;
    padding: 15px;
    border-radius: 12px;
  }

  .card h3 {
    margin: 0;
    font-size: 14px;
    color: #aaa;
  }

  .card p {
    font-size: 22px;
    margin: 10px 0;
  }

  .grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 15px;
    margin-top: 20px;
  }

  .panel {
    background: #1a2030;
    padding: 15px;
    border-radius: 12px;
  }

  canvas {
    margin-top: 10px;
  }

  .logout-btn {
    margin-top: 20px;
    background: #ff4d6d;
    padding: 10px;
    border: none;
    width: 100%;
    border-radius: 8px;
    color: white;
    cursor: pointer;
  }
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo">BudgetBrain</div>
  <a class="active">Dashboard</a>
  <a onclick="goPage('profile.html')">Profile</a>
  <a onclick="goPage('settings.html')">Settings</a>

  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- Main -->
<div class="main">

  <div class="topbar">
    <h2>Hello, <span id="username">User</span> 👋</h2>
    <input type="text" placeholder="Search...">
  </div>

  <!-- Cards -->
  <div class="cards">
    <div class="card">
      <h3>Total Balance</h3>
      <p>$857,850</p>
      <canvas id="balanceChart"></canvas>
    </div>

    <div class="card">
      <h3>Total Expenses</h3>
      <p>$198,110</p>
      <canvas id="expenseChart"></canvas>
    </div>

    <div class="card">
      <h3>Categories</h3>
      <canvas id="categoryChart"></canvas>
    </div>
  </div>

  <!-- Charts -->
  <div class="grid">
    <div class="panel">
      <h3>Income vs Expenses</h3>
      <canvas id="lineChart"></canvas>
    </div>

    <div class="panel">
      <h3>Spending Breakdown</h3>
      <canvas id="donutChart"></canvas>
    </div>
  </div>

</div>

<script>

// ✅ LOAD USER FROM LOGIN
const user = JSON.parse(localStorage.getItem("user"));
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "index.html";
}

if (user) {
  document.getElementById("username").innerText = user.username;
}

// ✅ LOGOUT
function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  window.location.href = "index.html";
}

// ✅ NAVIGATION
function goPage(page) {
  window.location.href = page;
}

// Charts (same as yours)
new Chart(document.getElementById("balanceChart"), {
  type: "line",
  data: {
    labels: ["Jan","Feb","Mar","Apr","May"],
    datasets: [{
      data: [30,50,40,60,80],
      borderColor: "#7c5cff",
      fill: false
    }]
  },
  options: { plugins: { legend: { display: false } } }
});

new Chart(document.getElementById("expenseChart"), {
  type: "line",
  data: {
    labels: ["Jan","Feb","Mar","Apr","May"],
    datasets: [{
      data: [20,40,30,50,70],
      borderColor: "#ff4d6d",
      fill: false
    }]
  },
  options: { plugins: { legend: { display: false } } }
});

new Chart(document.getElementById("categoryChart"), {
  type: "doughnut",
  data: {
    labels: ["Food","Rent","Travel","Other"],
    datasets: [{
      data: [30,25,20,25],
      backgroundColor: ["#7c5cff","#ff4d6d","#00d4ff","#00ff88"]
    }]
  }
});

new Chart(document.getElementById("lineChart"), {
  type: "line",
  data: {
    labels: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
    datasets: [
      {
        label: "Income",
        data: [500,700,600,800,900,750,950],
        borderColor: "#7c5cff"
      },
      {
        label: "Expense",
        data: [400,500,450,600,650,700,800],
        borderColor: "#ff4d6d"
      }
    ]
  }
});

new Chart(document.getElementById("donutChart"), {
  type: "doughnut",
  data: {
    labels: ["Food","House","Car","Shopping"],
    datasets: [{
      data: [35,25,20,20],
      backgroundColor: ["#7c5cff","#00d4ff","#ff4d6d","#00ff88"]
    }]
  }
});
</script>

</body>
</html>
