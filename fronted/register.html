<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - BudgetBrain</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>Register</h1>

      <input type="text" id="username" placeholder="Enter your username" />
      <input type="email" id="email" placeholder="Enter your email" />
      <input type="password" id="password" placeholder="Enter your password" />

      <button class="login-btn" onclick="registerUser()">Register</button>

      <p class="register-text">
        Already have an account?
        <a href="index.html">Login</a>
      </p>

      <p id="message"></p>
    </div>
  </div>

  <script>
    async function registerUser() {
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("message");

      if (!username || !email || !password) {
        message.innerText = "Please fill all fields";
        return;
      }

      try {
        const res = await fetch("http://localhost:5000/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, email, password })
        });

        const text = await res.text();
        console.log("RAW RESPONSE:", text);

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          message.innerText = "Server did not return valid JSON";
          return;
        }

        console.log("REGISTER RESPONSE:", data);

        if (data.success) {
          alert("Registered successfully ✅");
          window.location.href = "index.html";
        } else {
          message.innerText = data.message + (data.error ? " | " + data.error : "");
        }
      } catch (error) {
        console.error("FETCH ERROR:", error);
        message.innerText = "Cannot connect to server ❌";
      }
    }
  </script>
</body>
</html>
