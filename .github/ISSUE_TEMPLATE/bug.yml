name: Bug
description: Report a bug with reproducible steps and evidence.
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## How to use this form
        - Report bugs early (don't save them for demo day).
        - Include steps to reproduce so someone else can confirm it.
        - Add evidence (screenshots in repo, logs, links).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      placeholder: "What is broken? One sentence."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1)
        2)
        3)
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "What should happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: "What actually happens?"
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence (links/screenshots/logs)
      description: Prefer screenshots saved in the repo (ex -  docs/images/...) plus links to related Issues/PRs.
      placeholder: |
        - Screenshot path: docs/images/...
        - Log snippet:
        - Related PR/commit:
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0 - Blocks demo / cannot run
        - P1 - Major feature broken
        - P2 - Minor / workaround exists
        - P3 - Cosmetic
    validations:
      required: true

  - type: input
    id: owner
    attributes:
      label: Owner (who will take first action)
      description: Put a GitHub @handle so the bug has a human attached to it.
      placeholder: "@github-handle"
    validations:
      required: false