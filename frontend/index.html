<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - BudgetBrain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>Login</h1>

      <input type="email" id="email" placeholder="Enter your email">
      <input type="password" id="password" placeholder="Enter your password">

      <div class="options">
        <label class="remember">
          <input type="checkbox" id="remember">
          <span>Remember me</span>
        </label>

        <a href="#">Forgot password?</a>
      </div>

      <button class="login-btn" onclick="login()">Log In</button>

      <p class="register-text">
        Don't have an account?
        <a href="register.html">Register</a>
      </p>

      <p id="message"></p>
    </div>
  </div>

  <script>
    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("message");

      if (!email || !password) {
        message.innerText = "Please enter email and password";
        return;
      }

      try {
        const res = await fetch("http://localhost:5000/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const text = await res.text();
        console.log("LOGIN RAW RESPONSE:", text);

        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          message.innerText = "Server did not return valid JSON";
          return;
        }

        if (data.success) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("user", JSON.stringify(data.user));
          message.innerText = "Login successful ✅";

          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 1000);
        } else {
          message.innerText = data.message || "Login Failed ❌";
        }
      } catch (error) {
        console.log("LOGIN FETCH ERROR:", error);
        message.innerText = "Cannot connect to server ❌";
      }
    }
  </script>

</body>
</html>
