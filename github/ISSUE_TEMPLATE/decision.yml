name: Decision Record (Personal-Finance-Intelligence-System)
description: Document a key decision for the Personal-Finance-Intelligence-System
labels: ["decision"]

body:
  - type: markdown
    attributes:
      value: |
        ## Decision Record for Personal-Finance-Intelligence-System
        Please document the decision and its context.

  - type: input
    id: decision
    attributes:
      label: Decision
      description: What decision was made?
      placeholder: Choose a database technology for the system
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What led to this decision?
      placeholder: Describe the background and requirements
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other options were considered?
      placeholder: List alternative solutions and why they were not chosen
    validations:
      required: false

  - type: textarea
    id: consequences
    attributes:
      label: Consequences
      description: What are the consequences of this decision?
      placeholder: Describe benefits, risks, and trade-offs
    validations:
      required: false