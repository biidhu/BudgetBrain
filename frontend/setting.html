<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - BudgetBrain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="settings-page">
    <div class="topbar">
      <h2>Settings</h2>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="profile.html">Profile</a>
        <button onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="profile-box">
      <img id="settingsAvatarPreview" class="avatar-preview" src="" alt="Avatar">

      <input type="text" id="settingsUsername" placeholder="Enter username">
      <input type="text" id="settingsAvatar" placeholder="Enter avatar image URL">

      <select id="settingsTheme">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>

      <button class="action-btn" onclick="saveSettings()">Save Settings</button>
      <p id="message"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
