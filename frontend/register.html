<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register - BudgetBrain</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>Register</h1>

      <input type="text" id="username" placeholder="Enter your username" />
      <input type="email" id="email" placeholder="Enter your email" />
      <input type="password" id="password" placeholder="Enter your password" />

      <button class="login-btn" onclick="registerUser()">Register</button>

      <p>
        Already have an account?
        <a href="index.html">Login</a>
      </p>

      <p id="message"></p>
    </div>
  </div>

  <script>
    async function registerUser() {
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("message");

      if (!username || !email || !password) {
        message.innerText = "Please fill all fields";
        return;
      }

      try {
        const res = await fetch("http://localhost:5000/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username: username,
            email: email,
            password: password
          })
        });

        const text = await res.text();
        console.log("REGISTER RAW RESPONSE:", text);

        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          message.innerText = "Server did not return valid JSON";
          return;
        }

        if (data.success) {
          message.innerText = "Registered successfully ✅";
          setTimeout(() => {
            window.location.href = "index.html";
          }, 1000);
        } else {
          message.innerText = data.message || "Registration failed";
        }

      } catch (error) {
        console.log("REGISTER FETCH ERROR:", error);
        message.innerText = "Cannot connect to server ❌";
      }
    }
  </script>

</body>
</html>
