<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BudgetBrain Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="sidebar">
    <div class="logo">BudgetBrain</div>

    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="profile.html">Profile</a>
    <a href="settings.html">Settings</a>

    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <img id="dashboardAvatar" class="top-avatar" src="" alt="Avatar">
        <h2>Hello, <span id="username">User</span> 👋</h2>
      </div>

      <input type="text" placeholder="Search...">
    </div>

    <div class="cards">
      <div class="card">
        <h3>Total Balance</h3>
        <p id="totalBalance">$0.00</p>
        <canvas id="balanceChart"></canvas>
      </div>

      <div class="card">
        <h3>Total Expenses</h3>
        <p id="totalExpenses">$0.00</p>
        <canvas id="expenseChart"></canvas>
      </div>

      <div class="card">
        <h3>Categories</h3>
        <canvas id="categoryChart"></canvas>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <h3>Income vs Expenses</h3>
        <canvas id="lineChart"></canvas>
      </div>

      <div class="panel">
        <h3>Spending Breakdown</h3>
        <canvas id="donutChart"></canvas>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
